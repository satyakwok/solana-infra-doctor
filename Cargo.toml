[package]
name = "solana-infra-doctor"
version = "0.1.0"
edition = "2021"
rust-version = "1.76"
description = "A lightweight Rust CLI for diagnosing Solana RPC and infrastructure health."
license = "MIT OR Apache-2.0"
repository = "https://github.com/satyakwok/solana-infra-doctor"

[[bin]]
name = "sol-doctor"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.37", features = ["macros", "rt-multi-thread", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2.5"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(coverage)"] }
