name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Generate coverage
        run: >
          cargo llvm-cov --all-targets
          --ignore-filename-regex 'main.rs'
          --fail-under-lines 95
          --lcov
          --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
          use_oidc: true

  # Portability gate: the `rust` job above is the canonical fmt/clippy/coverage
  # gate on Linux, so this only runs the test suite on the other two OSes we ship
  # binaries for. The suite is hermetic (in-process mock servers), so no network.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

  # Enforce the declared MSRV (Cargo.toml `rust-version`) so a dependency bump
  # cannot silently raise it.
  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Check
        run: cargo check --all-targets
