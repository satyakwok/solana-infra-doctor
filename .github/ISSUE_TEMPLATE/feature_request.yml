name: Feature request
description: Suggest a check, command, profile, or improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Solana Infra Doctor is a **local-first diagnostic CLI**. Out of scope (please
        don't request): hosted dashboard/SaaS, token/NFT/airdrop/points, account
        systems, or provider SLA/uptime guarantees. See the
        [roadmap](../../docs/roadmap.md) for direction.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The diagnostic gap or workflow pain, and who has it (bot, wallet, indexer, CI, infra team).
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like sol-doctor to do. A CLI sketch is welcome.
      render: bash
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - check (single-endpoint HTTP)
        - compare (multi-endpoint scoring)
        - workload profile
        - ws (WebSocket)
        - grpc (Yellowstone)
        - reports (JSON / Markdown)
        - GitHub Action
        - docs / examples
        - other
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope & safety
      description: Does it stay read-only and local-first? Anything that touches credentials or remote state?
